<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Risk Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { color: #333; }
        input { width: 100%; padding: 8px; margin: 6px 0 14px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; padding: 12px 24px; border: none; cursor: pointer; font-size: 16px; border-radius: 4px; }
        .result { margin-top: 24px; font-size: 20px; font-weight: bold; padding: 16px; background: #f0f0f0; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>Diabetes Risk Predictor</h1>
    <form action="/predict" method="post">
        <label>Pregnancies</label>
        <input type="number" name="Pregnancies" placeholder="e.g. 2" required>
        <label>Glucose</label>
        <input type="number" name="Glucose" placeholder="e.g. 120" required>
        <label>Blood Pressure</label>
        <input type="number" name="BloodPressure" placeholder="e.g. 70" required>
        <label>Skin Thickness</label>
        <input type="number" name="SkinThickness" placeholder="e.g. 20" required>
        <label>Insulin</label>
        <input type="number" name="Insulin" placeholder="e.g. 80" required>
        <label>BMI</label>
        <input type="number" step="0.1" name="BMI" placeholder="e.g. 25.5" required>
        <label>Diabetes Pedigree Function</label>
        <input type="number" step="0.001" name="DiabetesPedigreeFunction" placeholder="e.g. 0.351" required>
        <label>Age</label>
        <input type="number" name="Age" placeholder="e.g. 25" required>
        <br>
        <button type="submit">Predict</button>
    </form>
    {% if result %}
    <div class="result">{{ result }}</div>
    {% endif %}
</body>
</html>
